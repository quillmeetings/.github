name: Bug report
description: Report something that is not working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a report. Please fill out the
        sections below so we can reproduce and fix the issue.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear, concise description of the problem.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: What did you do, step by step?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What actually happened? Include screenshots or logs if helpful.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which version, build, or commit are you on?
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS and version, device, or other relevant context.
    validations:
      required: false
